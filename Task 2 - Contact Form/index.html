<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 2 - Contact Form</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 shadow-sm p-4 bg-white rounded">
                <h2 class="text-center mb-4">Contact Us</h2>
                
                <form>
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" class="form-control" id="name" placeholder="Enter your full name">
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" class="form-control" id="email" placeholder="name@example.com">
                    </div>

                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <input type="text" class="form-control" id="subject" placeholder="What is this about?">
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea class="form-control" id="message" rows="4" placeholder="Your message here..."></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">Submit</button>
                </form>

            </div>
        </div>
    </div>
<script>
// --- JAVASCRIPT code ---
    
    // 1. Hook into the form element on the page so we can control what happens when it's submitted
    const contactForm = document.querySelector('form');

    // Listen for the exact moment the user clicks the "Submit" button
    contactForm.addEventListener('submit', function(e) {
        
        // e.preventDefault() stops the page from doing its default reload. 
        // This lets us check the data first before anything else happens.
        e.preventDefault();

        // 2. Grab exactly what the user typed into the input boxes using their IDs
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const message = document.getElementById('message').value;

        // 3. Simple Front-End Validation
        // If any of the essential fields are empty, we stop and warn the user.
        if (name === "" || email === "" || message === "") {
            alert("Oops! Please fill in all the required fields.");
            // 'return' kicks us out of this function immediately so the form doesn't process
            return; 
        }

        // 4. Basic Email Format Check
        // This is a Regular Expression (Regex). It checks if the email follows a basic "text@text.domain" pattern.
        // It's a solid first line of defense to ensure the input actually looks like an email.
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        
        // If the typed email doesn't match the pattern, warn them and stop.
        if (!emailPattern.test(email)) {
            alert("Please enter a valid email address.");
            return;
        }

        // 5. Success State
        // If the code makes it this far, all our checks passed.
        alert("Success! Your message has been sent (simulated).");
        
        // Wipes the form clean so it's ready for the next person
        contactForm.reset(); 
    });
</script>

</body>
</html>
