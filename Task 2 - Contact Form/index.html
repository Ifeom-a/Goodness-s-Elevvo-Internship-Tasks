<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 2 - Contact Form</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 shadow-sm p-4 bg-white rounded">
                <h2 class="text-center mb-4">Contact Us</h2>
                
                <form>
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" class="form-control" id="name" placeholder="Enter your full name">
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" class="form-control" id="email" placeholder="name@example.com">
                    </div>

                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <input type="text" class="form-control" id="subject" placeholder="What is this about?">
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea class="form-control" id="message" rows="4" placeholder="Your message here..."></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block">Submit</button>
                </form>

            </div>
        </div>
    </div>

<script>
    // 1. Grab the form element
    const contactForm = document.querySelector('form');

    contactForm.addEventListener('submit', function(e) {
        // Prevent the page from refreshing immediately
        e.preventDefault();

        // 2. Get the values from the inputs
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const message = document.getElementById('message').value;

        // 3. Simple Validation Logic
        if (name === "" || email === "" || message === "") {
            alert("Oops! Please fill in all the required fields.");
            return;
        }

        // 4. Basic Email Format Check (Regex)
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailPattern.test(email)) {
            alert("Please enter a valid email address.");
            return;
        }

        // If everything is fine
        alert("Success! Your message has been sent (simulated).");
        contactForm.reset(); // Clears the form
    });
</script>

</body>
</html>
